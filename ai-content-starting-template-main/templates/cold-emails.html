{% extends 'includes/layout.html' %}


{% block body %}
<main class="container">
  <div class="bg-light p-5 rounded mt-5">
    <h1> ✉️ Pro Mail Writer ✉️ ️</h1>
    <p class="lead">

    </p>

    <h2>Enter Your Topic</h2>

    <form class="" action="/cold-emails" method="post">

      <div class="mb-3">
        <label class="form-label">Topic:</label>
        <input type="text" class="form-control" name="coldEmails" placeholder="eg. Undertaking Letter">
        <div class="form-text"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg"> Generate</button>

    </form>
  </div>


  <div class="p-3 rounded">
    <div class="row">
      <div class="col-lg-12">
        <h3 class="text-primary">{{prompt}}</h3>
        <p class="lead">{{openAIAnswer}}</p>

      </div>
    </div>
  </div>
</main>
{% endblock %}
